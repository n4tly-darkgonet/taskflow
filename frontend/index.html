<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>TaskFlow</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph tags: control the title/description/image shown when
         this link is pasted into Discord, Slack, iMessage, WhatsApp, etc. -->
    <meta property="og:title" content="TaskFlow" />
    <meta property="og:description" content="Organize your work, one board at a time - a Trello-style task manager." />
    <meta property="og:image" content="https://taskflow-lovat-psi.vercel.app/og-image.png" />
    <meta property="og:url" content="https://taskflow-lovat-psi.vercel.app/" />
    <meta property="og:type" content="website" />

    <!-- Twitter's own card format - some apps (and X/Twitter) read this instead -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TaskFlow" />
    <meta name="twitter:description" content="Organize your work, one board at a time." />
    <meta name="twitter:image" content="https://taskflow-lovat-psi.vercel.app/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
